name: Autonomous Merge

on:
  schedule:
    - cron: "47 4 * * *"
    - cron: "53 10 * * *"
    - cron: "11 16 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autonomous-merge
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Load autonomy configuration
        id: config
        run: |
          python3 - <<'PY'
          import json
          import os

          with open("automation/autonomy.json", "r", encoding="utf-8") as handle:
              cfg = json.load(handle)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"proposal_branch={cfg['pull_request_branch']}\n")
              handle.write(f"proposal_label={cfg['pull_request_label']}\n")
              handle.write(f"heartbeat_branch={cfg['heartbeat_branch']}\n")
              handle.write(f"heartbeat_label={cfg['heartbeat_label']}\n")
              handle.write(f"minimum_pr_age_hours={cfg['minimum_pr_age_hours']}\n")
              handle.write(f"stale_pr_close_hours={cfg['stale_pr_close_hours']}\n")
          PY

      - name: Maintain autonomous PRs
        uses: actions/github-script@v7
        with:
          script: |
            const managedBranches = [
              '${{ steps.config.outputs.proposal_branch }}',
              '${{ steps.config.outputs.heartbeat_branch }}',
            ];
            const managedLabels = [
              '${{ steps.config.outputs.proposal_label }}',
              '${{ steps.config.outputs.heartbeat_label }}',
            ];
            const minAgeHours = Number('${{ steps.config.outputs.minimum_pr_age_hours }}');
            const staleHours = Number('${{ steps.config.outputs.stale_pr_close_hours }}');
            const { owner, repo } = context.repo;

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const managed = prs.filter((item) =>
              managedBranches.includes(item.head.ref) ||
              item.labels.some((tag) => managedLabels.includes(tag.name))
            );

            if (managed.length === 0) {
              core.notice('No autonomous PR is open.');
              return;
            }

            for (const pr of managed) {
              const createdAt = new Date(pr.created_at).getTime();
              const ageHours = (Date.now() - createdAt) / (1000 * 60 * 60);
              const fullPr = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              });

              if (fullPr.data.draft) {
                core.notice(`PR #${pr.number} is draft; waiting.`);
                continue;
              }

              const checks = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: fullPr.data.head.sha,
              });
              const badCheck = checks.data.check_runs.find((check) =>
                check.status !== 'completed' || check.conclusion !== 'success'
              );

              const statuses = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: fullPr.data.head.sha,
              });

              const mergeable = ['clean', 'has_hooks', 'unstable'].includes(fullPr.data.mergeable_state);
              const checksGreen = !badCheck && statuses.data.state === 'success';

              if (ageHours >= staleHours && (!mergeable || !checksGreen)) {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: pr.number,
                  state: 'closed',
                });
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${pr.head.ref}`,
                }).catch(() => {});
                core.notice(`Closed stale autonomous PR #${pr.number}.`);
                continue;
              }

              if (ageHours < minAgeHours) {
                core.notice(`PR #${pr.number} is only ${ageHours.toFixed(2)}h old; waiting.`);
                continue;
              }

              if (!mergeable) {
                core.notice(`PR #${pr.number} mergeable_state=${fullPr.data.mergeable_state}; waiting.`);
                continue;
              }

              if (badCheck) {
                core.notice(`PR #${pr.number} has non-green check: ${badCheck.name}`);
                continue;
              }

              if (statuses.data.state !== 'success') {
                core.notice(`PR #${pr.number} combined status is ${statuses.data.state}; waiting.`);
                continue;
              }

              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: `chore: autonomous evolution (${new Date().toISOString().slice(0, 10)})`,
              });
              core.notice(`PR #${pr.number} merged.`);
            }
